<!-- Side widgets-->
<div class="col-lg-4" style="position: fixed; bottom: 350px; right: 300px; width: 500px;">
    <!-- Search widget-->
    <div class="card mb-4">
        <div class="card-header">Поиск</div>
        <div class="card-body">
            <div class="input-group">
                <input class="form-control" type="text" placeholder="Введите запрос..." aria-label="Enter search term..." aria-describedby="button-search" />
                <button class="btn btn-primary" id="button-search" type="button">Искать!</button>
            </div>
        </div>
    </div>
    <!-- Dream Team widget-->
    <div class="card mb-4">
        <div class="card-header">Dream Team</div>
        <div class="card-body">
            <div class="row">
                {% for teammate in dreamteam %}
                <div class="col-sm-6">
                    <ul class="list-unstyled mb-0">
                        <li>
                            <a class="text-decoration-none" href="{% url 'user-profile' teammate.user.username %}">
                                {{ teammate.user.username }}
                            </a>
                        </li>
                    </ul>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
    <!-- Tagline widget-->
    <div class="card mb-4">
        <div class="card-header">{{ tagline.title }}</div>
        <div class="card-body">{{ tagline.text }}</div>
    </div>
    {% if user.is_staff %}
    <a class="btn btn-primary" href="{% url 'tagline' %}" style="width: 100%;">Встречайте новый слоган!</a>
    {% endif %}
</div>

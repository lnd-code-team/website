{% extends '../base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-lg-8">
            <!-- Post content-->
            <article>
                <!-- Post header-->
                <header class="mb-4">
                    <!-- Post title-->
                    <h1 class="fw-bolder mb-1">{{ post.title }}</h1>
                    <!-- Post meta content-->
                    <div class="text-muted fst-italic mb-2">{{ post.time_created|date:"F j, Y" }}
                      <a href="{% url 'user_profile' username=post.author.username %}">@{{post.author.username}}</a>
                    </div>
                </header>
                <!-- Preview image figure-->
                {% if post.image %}
                <figure class="mb-4"><img class="img-fluid rounded" src="{{ post.image.url }}" alt="..." style="width:90%;" /></figure>
                {% endif %}
                <!-- Post content-->
                <section class="mb-5">
                    <p>{{ post.text }}</p>
                </section>
            </article>
        </div>
    </div>
</div>
{% endblock content %}
